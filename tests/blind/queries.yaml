# Blind test queries for the seeklink test corpus (tests/corpus/).
#
# Design principles (see docs/blind-test.md):
# - Cover CJK-only, English-only, mixed, short, long, technical, casual
# - Avoid queries whose exact substring matches a title (title channel
#   would trivially win — tests nothing about hybrid / expansion)
# - `expected_paths` are hard must-hits; being outside top-10 is a failure
# - `expansion:` gives 2-3 hand-crafted alternates for config C
# - Tags are used for per-tag acceptance-criteria slicing
#
# 22 queries total.

# ============================================================================
# CJK-heavy queries (test jieba tokenizer + jina-v2-zh embedder on Chinese)
# ============================================================================

- query: "记忆保持力"
  intent: "find notes about how long memories last and how to extend retention"
  expected_paths:
    - "notes/spaced-repetition.md"
    - "notes/forgetting-curve.md"
    - "notes/memory-consolidation.md"
    - "logs/2026-W14.md"
  tags: [cjk, common, mid-length]
  expansion:
    - "间隔重复 遗忘曲线 FSRS"
    - "如何让大脑记住的东西不忘记"
    - "长期记忆保留 间隔算法"

- query: "遗忘规律"
  intent: "the underlying curve of how memory decays, not the practice of repetition"
  expected_paths:
    - "notes/forgetting-curve.md"
    - "sources/wikipedia-forgetting-curve.md"
