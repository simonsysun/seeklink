  tags: [cjk, methodology, mid-length]
  expansion:
    - "Zettelkasten Luhmann"
    - "永久笔记 原子笔记"
    - "slip-box note taking"

- query: "红烧肉做法"
  intent: "recipe for red-braised pork — tests off-topic discrimination"
  expected_paths:
    - "recipes/red-braised-pork.md"
  tags: [cjk, off-topic, short]
  expansion:
    - "五花肉 糖色 红烧"
    - "braised pork belly Chinese"

- query: "睡眠对记忆的影响"
  intent: "sleep's role in memory consolidation"
  expected_paths:
