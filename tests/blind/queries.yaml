  tags: [cjk, short]
  expansion:
    - "Ebbinghaus 遗忘曲线"
    - "记忆衰减的数学规律"
    - "forgetting curve 幂律 指数"

- query: "卡片盒笔记法"
  intent: "Luhmann's Zettelkasten method"
  expected_paths:
    - "notes/zettelkasten.md"
    - "sources/niklas-luhmann-zettelkasten.md"
